<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Milk Tracker Calendar</title>
<style>
body{font-family:Arial;background:#eef2f7;margin:0;padding:20px}
.wrap{max-width:900px;margin:auto}
.top{display:flex;justify-content:space-between;align-items:center}
button{padding:8px 12px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:10px}
.cell{background:#fff;padding:12px;border-radius:10px;min-height:60px;cursor:pointer;box-shadow:0 2px 6px #0002}
.on{background:#39c96b;color:#fff}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:15px 0}.card{background:#fff;padding:10px 14px;border-radius:10px}
.head{font-weight:bold;text-align:center}
</style></head><body><div class="wrap">
<div class="top"><button id="prev">◀</button><h2 id="title"></h2><button id="next">▶</button></div>
<div class="stats">
<div class="card">Cycle <b id="cycle">1</b></div>
<div class="card">Milk <b id="milk">0/30</b></div>
<div class="card">Amount <b id="amt">₹0</b></div>
</div>
<div class="grid" id="cal"></div>
<script>
const PRICE=70,wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
let view=new Date();
let db=JSON.parse(localStorage.getItem("milkCal")||'{"cycle":1,"entries":{}}');
function key(y,m,d){return y+"-"+m+"-"+d}
function render(){
cal.innerHTML="";
wd.forEach(w=>{let h=document.createElement("div");h.className="head";h.textContent=w;cal.appendChild(h)});
let y=view.getFullYear(),m=view.getMonth();
title.textContent=view.toLocaleString("en",{month:"long",year:"numeric"});
let first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
for(let i=0;i<first;i++){cal.appendChild(document.createElement("div"))}
let count=Object.values(db.entries).filter(Boolean).length;
cycle.textContent=Math.floor(count/30)+1;
milk.textContent=(count%30)+"/30";
amt.textContent="₹"+((count%30)*PRICE);
for(let d=1;d<=days;d++){
 let c=document.createElement("div"),k=key(y,m+1,d);
 c.className="cell"+(db.entries[k]?" on":"");
 c.innerHTML="<b>"+d+"</b><br>"+(db.entries[k]?"🥛":"");
 c.onclick=()=>{db.entries[k]=!db.entries[k];localStorage.setItem("milkCal",JSON.stringify(db));render();}
 cal.appendChild(c);
}
}
prev.onclick=()=>{view.setMonth(view.getMonth()-1);render()}
next.onclick=()=>{view.setMonth(view.getMonth()+1);render()}
render();
</script></body></html>
